apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: comments-service
  namespace: fb-live-comments
spec:
  parentRefs:
    - name: api-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: RegularExpression
            value: /v1/posts/[^/]+/comments$
      backendRefs:
        - name: comments-service
          port: 3001
