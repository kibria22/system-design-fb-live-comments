# Envoy Gateway data-plane settings for Minikube (NodePort instead of LoadBalancer).
# Listener port 80 is mapped to container port 10080 by Envoy Gateway (10000 + listen port).
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: api-gateway-proxy
  namespace: fb-live-comments
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 3
      envoyService:
        name: api-gateway
        type: NodePort
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - name: http-80
                  port: 80
                  protocol: TCP
                  targetPort: 10080
                  nodePort: 30080
