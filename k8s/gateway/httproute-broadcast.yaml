apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: broadcast-service
  namespace: fb-live-comments
spec:
  parentRefs:
    - name: api-gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: RegularExpression
            value: /v1/posts/[^/]+/comments/stream
      # SSE is long-lived; default request timeouts close the stream and
      # force EventSource reconnect loops (plus a since= catch-up each time).
      timeouts:
        request: "0s"
        backendRequest: "0s"
      backendRefs:
        - name: broadcast-service
          port: 3002
