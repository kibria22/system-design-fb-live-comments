apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: broadcast-sse
  namespace: fb-live-comments
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: broadcast-service
  timeout:
    http:
      # Disable upstream request timeout for SSE streams.
      requestTimeout: "0s"
