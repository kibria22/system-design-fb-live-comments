apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: broadcast-service
  namespace: fb-live-comments
  labels:
    app: broadcast-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: broadcast-service
  # Keep at least 2 pods so SSE clients are not concentrated on a single replica.
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # Longer window: dropping pods closes sticky SSE connections.
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
