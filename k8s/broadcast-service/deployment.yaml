apiVersion: apps/v1
kind: Deployment
metadata:
  name: broadcast-service
  namespace: fb-live-comments
  labels:
    app: broadcast-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: broadcast-service
  template:
    metadata:
      labels:
        app: broadcast-service
    spec:
      containers:
        - name: broadcast-service
          image: broadcast-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: REDIS_URL
              value: redis://redis:6379
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
